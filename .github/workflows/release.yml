name: "Release"

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      # 新增：让 Mac 和 Linux 服务器下载模型
      - name: Download AI Models (Unix)
        if: matrix.platform != 'windows-latest'
        run: |
          chmod +x setup_models.sh
          ./setup_models.sh

      # 新增：让 Windows 服务器用 PowerShell 下载模型
      - name: Download AI Models (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -Path "src-tauri\resources" -ItemType Directory -Force
          Invoke-WebRequest -Uri "https://huggingface.co/Xenova/bge-small-zh-v1.5/resolve/main/onnx/model.onnx" -OutFile "src-tauri\resources\model.onnx"
          Invoke-WebRequest -Uri "https://huggingface.co/Xenova/bge-small-zh-v1.5/resolve/main/tokenizer.json" -OutFile "src-tauri\resources\tokenizer.json"

      - name: install frontend dependencies
        run: npm install

      - name: Build and Package
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: VaultSeek-${{ github.ref_name }}
          releaseName: "VaultSeek RAG ${{ github.ref_name }}"
          releaseBody: |
            ## VaultSeek RAG 1.0 Release
            Enjoy local AI semantic search!
            - **Privacy First**: Your data never leaves your machine.
            - **Hybrid Search**: Semantic + Keyword matching.
            - **Multi-format**: Markdown, PDF, TXT, DOCX.
          releaseDraft: false
          prerelease: false
